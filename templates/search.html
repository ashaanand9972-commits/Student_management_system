<!DOCTYPE html>
<html>
<head>
    <title>Search Student</title>
</head>
<body>

<h2>Search Student</h2>

<form method="POST">

<input type="text" name="keyword" placeholder="Enter Student Name">

<input type="submit" value="Search">

</form>

<br>

<table border="15">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Course</th>
    <th>Phone</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
<td>{{ student[4] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Home</a>

</body>
</html>
