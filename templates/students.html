<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>All Students</h2>

<table border="15">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Course</th>
    <th>Phone</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
<td>{{ student[4] }}</td>

<td>
<a href="/edit/{{ student[0] }}">Edit</a>

<a href="/delete/{{ student[0] }}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Home</a>

</body>
</html>
